<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Companion AI</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <div id="app-root">
    <header class="topbar">
      <div class="brand">Companion<span class="accent">AI</span><span class="tag">personal</span></div>
      <div class="controls">
        <button id="healthBtn" title="Refresh Metrics">Refresh</button>
      </div>
    </header>
    <main class="layout">
      <section class="chat" id="chatPane"></section>
      <aside class="side">
        <nav class="tabs">
          <button class="tab active" data-tab="memory">Memory</button>
          <button class="tab" data-tab="models">Models</button>
          <button class="tab" data-tab="search">Search</button>
          <button class="tab" data-tab="metrics">Metrics</button>
        </nav>
        <div class="tabpanes">
          <div class="pane active" id="pane-memory">
            <h3>Profile Facts</h3>
            <ul id="profileList" class="kv facts"></ul>
            <div class="legend" style="font-size:11px;color:#768390;margin:4px 0 10px;">Confidence: <span class="badge conf-high">high</span> <span class="badge conf-med">medium</span> <span class="badge conf-low">low</span> &nbsp;• click fact to expand provenance</div>
            <h3 style="margin-top:1em;">Pending Facts <span id="pendingBadge" style="font-size:0.7em;color:#888;"></span></h3>
            <ul id="pendingFacts" class="kv"></ul>
            <h3>Summaries</h3>
            <ul id="summaryList" class="bullets"></ul>
            <h3>Insights</h3>
            <ul id="insightList" class="bullets"></ul>
          </div>
          <div class="pane" id="pane-models">
            <h3>Routing & Ensemble</h3>
            <div id="modelsPanel" class="models-panel"></div>
            <h3 style="margin-top:1em;">Recent Routing</h3>
            <div id="recentRouting" class="recent"></div>
          </div>
          <div class="pane" id="pane-search">
            <div class="searchBox">
              <input id="searchInput" placeholder="Search memory or web..." />
              <button id="searchBtn">Go</button>
            </div>
            <div id="searchResults" class="results"></div>
          </div>
          <div class="pane" id="pane-metrics">
            <pre id="metricsOut" class="metrics"></pre>
          </div>
        </div>
      </aside>
    </main>
    <footer class="composer">
      <div class="composer-col">
        <textarea id="userInput" rows="1" placeholder="Type your message... /help for commands" spellcheck="false" autofocus></textarea>
        <div id="cmdHints" class="cmd-hints" style="display:none;"></div>
      </div>
      <div class="composer-actions">
        <button id="sendBtn">Send</button>
        <span id="status" class="status"></span>
      </div>
    </footer>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
